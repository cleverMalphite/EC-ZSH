[Main]
;终端号
DeviceID=101
;设置NETCOMM模块UDP数据最多积压的数目
NETCOMM_MAX_UNDEAL_NUMBER=8000
;
SPEEDCONTROL_MAX_UNDEAL_NUMBER=20000
;
CheckFrequency=1000
;
TestCycle=1000
;
UdpSocketBufferSize=16777216
;udp socket发送和接收缓冲区大小，单位为二进制位
;
IsForceTcp=false
;是否需要NAT,如果设置为需要NAT，那么不强制指定UDP远端端口号，而是通过recvfrom的方式获得
IsNat=false

[SpeedControl]
ExpectSpeed=300

[BigDataTransfer]
;存放接收数据的文件目录
recv_dir=../../FileRecv/
send_dir=../../FileSend/
DEST_TID=102

[NETCOMM]
UdpSocketBufferSize=67108864
Tcp_PostRecv_Number=5
Udp_PostRecv_Number=10
Bcast_PostRecv_Number=5

[QOS]
IS_QOS_OPEN=false
Hop_count=1

[MRUDP]
ScanNextQueueHeadForRetransfer=20
TIMESTAMP_DIFF_THRESHOLD=90
RUDP_CYCLEFILE_CAPACITY=40000
RUDP_FILE_PACKET_ENCODE_LENGTH=1400
RUDP_SACK_BLOCKS_MAX_NUM=8
;生成SACK区块的最大数目
WINDOWS_EXPECT_NUM_MULTI_WHEN_LOSS_DETECTED=1
RUDP_UNDEAL_DATA_NUMBER=30000

[RBUDP]
RBUDP_SEND_TEMP_FILEPATH=/home/ubuntu402/TEST/RBUDPStorage/Client/send.txt
RBUDP_RECV_TEMP_FILEPATH=/home/ubuntu402/TEST/RBUDPStorage/Client/recv.txt
RBUDP_FILESIZE=1369

[FirstOutDoorTest]
;是否为服务器
IsServer=false
;本地IP
;LocalIP=192.168.1.102
LocalIP=127.0.0.1
;本地端口
LocalPort=3021
;远端IP
;RemoteIP=192.168.0.111
RemoteIP=127.0.0.1
;远端端口
RemotePort=3020
;是否启用RBUDP
useRBUDP=false
;开启时间,单位为s
Runtime=1800

[AutoConn]
; 本端角色: 1=无人机端(UAV,被动监听), 2=地面端(GROUND,主动重连)
Role=1
; 本地监听IP（UAV端填本机IP；地面端填本机出口IP）
LocalIP=127.0.0.1
; 本地监听端口
LocalPort=3020
; 对端IP（UAV端填地面站IP；地面端填无人机IP）
RemoteIP=127.0.0.1
; 对端端口
RemotePort=3021
; 对端终端号（TID）
RemoteTID=102
; 地面端重连间隔（毫秒）
RetryIntervalMs=3000
; 心跳超时（毫秒），超过此时间无在线终端则认为断线
HeartbeatTimeoutMs=5000
