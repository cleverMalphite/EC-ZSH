[Main]
;终端号
DeviceID=103
;设置NETCOMM模块UDP数据最多积压的数目
NETCOMM_MAX_UNDEAL_NUMBER=8000
;
SPEEDCONTROL_MAX_UNDEAL_NUMBER=20000
;
CheckFrequency=1000
;
TestCycle=1000
;
UdpSocketBufferSize=16777216
;udp socket发送和接收缓冲区大小，单位为二进制位
;
IsForceTcp=false
;是否需要NAT,如果设置为需要NAT，那么不强制指定UDP远端端口号，而是通过recvfrom的方式获得
IsNat=false

[SpeedControl]
ExpectSpeed=300

[BigDataTransfer]
;存放接收数据的文件目录
recv_dir=../../FileRecv/
send_dir=../../FileSend/
DEST_TID=102

[NETCOMM]
UdpSocketBufferSize=67108864
Tcp_PostRecv_Number=5
Udp_PostRecv_Number=10
Bcast_PostRecv_Number=5

[QOS]
IS_QOS_OPEN=false
Hop_count=1

[MRUDP]
ScanNextQueueHeadForRetransfer=20
TIMESTAMP_DIFF_THRESHOLD=90
RUDP_CYCLEFILE_CAPACITY=40000
RUDP_FILE_PACKET_ENCODE_LENGTH=1400
RUDP_SACK_BLOCKS_MAX_NUM=8
;生成SACK区块的最大数目
WINDOWS_EXPECT_NUM_MULTI_WHEN_LOSS_DETECTED=1
RUDP_UNDEAL_DATA_NUMBER=30000

[RBUDP]
RBUDP_SEND_TEMP_FILEPATH=/home/jetson/TEST/RBUDPStorage/Client/send.txt
RBUDP_RECV_TEMP_FILEPATH=/home/jetson/TEST/RBUDPStorage/Client/recv.txt
RBUDP_FILESIZE=1369

[DTU]
;5G DTU 端口映射：本地端口范围 → 公网(NAT)端口范围
;映射公式：natport = (localport - LocalPortBegin) + NatPortBegin
;例：本地 7000 → 公网 8000，本地 7001 → 公网 8001
LocalPortBegin=7000
LocalPortEnd=7999
NatPortBegin=8000
NatPortEnd=8999

[FirstOutDoorTest]
;是否为服务器
IsServer=false
;本地IP
LocalIP=192.168.207.123
;本地端口
LocalPort=3021
;远端IP
RemoteIP=192.168.207.8
;远端端口
RemotePort=3020
;是否启用RBUDP
useRBUDP=false
;开启时间,单位为s
Runtime=1800

[AutoConn]
Role=1
LocalIP=192.168.1.103
LocalPort=3021
RemoteIP=192.168.1.123
RemotePort=3020
RemoteTID=101
EnableDiscovery=false
;连接模式: 0=仅自组网(MeshOnly), 1=仅DTU, 2=多链路叠加
ConnMode=0
;--- DTU 链路参数（ConnMode=1或2时有效）---
DTULocalIP=
DTULocalPort=0
DTURemoteIP=
DTURemotePort=0
;兼容旧版字段
IsDTU=false
;--- 自动发送（仅UAV端有效）---
;启用后自动监控FileSend目录，新文件写入完成后自动发送
AutoSendEnable=true
;自动发送目标终端号（默认读取BigDataTransfer/DEST_TID）
AutoSendTargetTID=102
;文件大小连续不变的扫描次数，达到后判定写入完成（默认2）
AutoSendStableChecks=2
;目录扫描间隔毫秒（默认2000）
AutoSendScanIntervalMs=2000